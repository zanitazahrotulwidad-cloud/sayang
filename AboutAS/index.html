<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bout As 💗</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

    <div class="card">

        <h3>A Bout As 🌸</h3>

        <h1>Hello, Sayang 💗</h1>

        <p>
            Welcome to our little memory gallery.<br>
            Every smile, every laugh, and every journey with you<br>
            will always have a special place in my heart.
        </p>

        <button id="openBtn">
            Open Our Story ❤️
        </button>

    </div>

</div>

<!-- Popup Password -->

<div class="popup" id="popup">

    <div class="popup-card">

        <h2>🔒 Secret Password</h2>

        <p>
            Enter our anniversary date
        </p>

        <input
        type="password"
        id="password"
        placeholder="DDMMYYYY">

        <button onclick="checkPassword()">
            Open
        </button>

        <p id="message"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
