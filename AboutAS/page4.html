<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Kenangan 🤍</title>
    <link rel="stylesheet" href="page4.CSS">
</head>

<body>

<div class="container">

    <h1>🎁 Kotak Kenangan Kita</h1>
    <p class="subtitle">
        Ada beberapa cerita kecil yang tersimpan di sini...
    </p>


    <!-- Kotak hadiah -->
    <div class="box-area" onclick="openBox()">

        <div class="lid">
        </div>

        <div class="box">
            🎁
        </div>

        <p id="openText">
            Klik kotaknya untuk membuka ✨
        </p>

    </div>



    <!-- Foto -->
    <div class="memory hidden">

        <img id="photo" src="">

        <h2 id="caption"></h2>

        <button onclick="nextPhoto()">
            Kenangan Selanjutnya 🤍
        </button>

    </div>


</div>


<script src="page4.js"></script>

</body>
</html>
